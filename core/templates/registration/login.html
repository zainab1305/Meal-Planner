{% extends "core/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}

<style>
  /* --- Login Page Scoped Styles --- */
  .auth-container {
    max-width: 460px;
    margin: 80px auto;
    position: relative;
  }

  /* Decorative background circles inside container */
  .auth-container::before,
  .auth-container::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.3;
  }

  .auth-container::before {
    width: 300px;
    height: 300px;
    top: -80px;
    left: -80px;
    background: radial-gradient(circle at center, #81d4fa, transparent);
  }

  .auth-container::after {
    width: 250px;
    height: 250px;
    bottom: -70px;
    right: -70px;
    background: radial-gradient(circle at center, #90caf9, transparent);
  }

  .auth-card {
    position: relative;
    z-index: 1;
    border: none;
    border-radius: 18px;
    padding: 2rem;
    background: #ffffff;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
    transition: transform 0.25s ease;
  }

  .auth-card:hover {
    transform: translateY(-3px);
  }

  .auth-card h2 {
    font-weight: 700;
    font-size: 1.8rem;
    color: #0b4d7a;
  }

  .auth-card label {
    font-weight: 500;
    color: #444;
    margin-bottom: 5px;
    display: inline-block;
  }

  .auth-card .form-control {
    border-radius: 10px;
    padding: 10px 14px;
    border: 1px solid #ccc;
    transition: border-color 0.3s ease;
    font-size: 0.95rem;
  }

  .auth-card .form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
  }

  .auth-card .btn-primary {
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    padding: 10px;
    background-color: #73b9e7;
    border: none;
    transition: all 0.3s ease;
  }

  .auth-card .btn-primary:hover {
    background-color: #0a58ca;
    transform: scale(1.02);
  }

  .auth-card .extra-info {
    font-size: 0.9rem;
    color: #555;
    background: #f8f9fa;
    padding: 10px 14px;
    border-radius: 10px;
    margin-top: 1rem;
  }

  .auth-card .auth-link {
    margin-top: 1.2rem;
    font-size: 0.95rem;
    color: #555;
  }

  .auth-card .auth-link a {
    text-decoration: none;
    font-weight: 600;
    color: #0d4063;
  }

  .auth-card .auth-link a:hover {
    text-decoration: underline;
  }
</style>

<div class="auth-container">
  <div class="card auth-card">
    <h2 class="text-center mb-4">Login</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>

    <div class="extra-info">
      <strong>Demo Credentials</strong><br>
      Username: <code>green</code><br>
      Password: <code>HelloWorld</code>
    </div>

    <p class="auth-link text-center">
      Don’t have an account? <a href="{% url 'signup' %}">Sign up here</a>
    </p>
  </div>
</div>

{% endblock %}
