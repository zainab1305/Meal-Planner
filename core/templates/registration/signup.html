{% extends "core/base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<style>
  :root{
    --bg: #f4f8fc;
    --card-bg: rgba(255,255,255,0.98);
    --muted: #6b7280;
    --accent: #0b4d7a;   /* heading color (not black) */
    --btn: #0b76ff;
    --radius: 18px;
  }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: "Inter", "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background-color: var(--bg);

    /* subtle, repeating SVG pattern — not a gradient */
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><rect width='80' height='80' fill='%23f4f8fc'/><g fill='%23e9f1fb' opacity='0.6'><circle cx='10' cy='10' r='2'/><circle cx='40' cy='40' r='2'/><circle cx='70' cy='70' r='2'/><circle cx='90' cy='20' r='2'/></g></svg>");
    background-repeat: repeat;
    color: #0f1724;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* center the card horizontally + vertically */
  .auth-viewport {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
  }

  .auth-card {
    width: 100%;
    max-width: 520px;
    border-radius: var(--radius);
    padding: 28px 32px;
    background: var(--card-bg);                 /* solid-ish card, not a gradient */
    box-shadow: 0 16px 48px rgba(20,40,80,0.08);
    border: 1px solid rgba(15,23,42,0.04);
    position: relative;
    overflow: hidden;
  }

  /* decorative, soft shapes (SVG) — subtle and non-gradient */
  .auth-card::after {
    content: "";
    position: absolute;
    right: -120px;
    top: -60px;
    width: 300px;
    height: 300px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><circle cx='50' cy='50' r='80' fill='%230b4d7a' opacity='0.06'/><circle cx='140' cy='140' r='60' fill='%230b76ff' opacity='0.04'/></svg>");
    background-repeat: no-repeat;
    transform: rotate(15deg);
    pointer-events: none;
  }

  /* heading — changed from black to accent */
  .auth-card h2 {
    margin: 0 0 8px 0;
    font-size: 1.9rem;
    line-height: 1.05;
    color: var(--accent);
    letter-spacing: -0.02em;
    text-align: center;
    font-weight: 700;
  }

  .auth-card .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 16px;
  }

  /* form controls */
  label { display:block; font-weight:600; color:#24303a; margin-bottom:6px; font-size:0.95rem; }
  .form-row { margin-bottom:14px; }
  input[type="text"], input[type="password"], input[type="email"],
  textarea, select, .form-control {
    width:100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(15,23,42,0.08);
    background: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    font-size: 0.96rem;
    color: #0f1724;
    transition: box-shadow 200ms ease, border-color 200ms ease, transform 150ms ease;
  }

  input:focus, .form-control:focus {
    outline: none;
    border-color: var(--btn);
    box-shadow: 0 8px 30px rgba(11,118,255,0.12);
    transform: translateY(-1px);
  }

  /* help text and errors */
  .helptext, small.form-text, .form-text {
    display:block;
    color: var(--muted);
    font-size: 0.86rem;
    margin-top:6px;
    line-height:1.3;
  }
  ul.errorlist {
    color: #d04545;
    font-size: 0.88rem;
    margin: 6px 0 0 0;
    padding-left: 18px;
  }

  /* primary button — strong solid color with shadow */
  .btn-primary {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--btn);
    color: #fff;
    font-weight: 700;
    border: none;
    box-shadow: 0 10px 30px rgba(11,118,255,0.14);
    transition: transform 180ms ease, box-shadow 180ms ease;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(11,118,255,0.18); }

  .auth-footer { text-align:center; margin-top:16px; color:var(--muted); }
  .auth-footer a { color: var(--btn); font-weight:600; text-decoration:none; }
  .auth-footer a:hover { text-decoration:underline; }

  @media (max-width:480px) {
    .auth-card { padding:20px; }
    .auth-card h2 { font-size:1.5rem; }
  }
</style>

<div class="auth-viewport">
  <div class="card auth-card">
    <h2>Create an Account</h2>
    <p class="subtitle">Quickly create your account to get started — it's free and takes less than a minute.</p>

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <div class="form-row mt-2">
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </div>
    </form>

    <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
  </div>
</div>
{% endblock %}
