{% extends "core/base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <h2>Edit Pantry Item: {{ item.name }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'pantry_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
